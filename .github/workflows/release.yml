name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: write

jobs:
  run-pipeline:
    name: Run release pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aeswibon/pipeline-compose-run@v1.1.0
        with:
          pipeline_file: .github/pipelines/release.yml
          github_token: ${{ github.token }}
